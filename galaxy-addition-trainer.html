<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Addition Trainer</title>
  <style>
    :root {
      --glow: #8be9ff; --pink: #ff4fd8; --gold: #ffe66d; --green: #69ff94;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh; overflow: hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: white;
      background: radial-gradient(circle at 15% 15%, rgba(255,79,216,.35), transparent 28%), radial-gradient(circle at 85% 20%, rgba(139,233,255,.32), transparent 26%), radial-gradient(circle at 50% 90%, rgba(105,255,148,.18), transparent 35%), linear-gradient(135deg, #060014 0%, #09042e 45%, #01030c 100%);
    }
    .space, .stars, .stars2, .stars3, .meteors, .nebula { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .stars, .stars2, .stars3 { background-repeat: repeat; animation: drift 70s linear infinite; }
    .stars { background-image: radial-gradient(#fff 1px, transparent 1px), radial-gradient(#8be9ff 1px, transparent 1px); background-size: 90px 90px, 140px 140px; opacity: .9; }
    .stars2 { background-image: radial-gradient(rgba(255,255,255,.8) 1px, transparent 1px); background-size: 55px 55px; animation-duration: 42s; opacity: .6; }
    .stars3 { background-image: radial-gradient(rgba(255,230,109,.9) 1.3px, transparent 1.3px); background-size: 180px 180px; animation-duration: 100s; opacity: .45; }
    .nebula { background: conic-gradient(from 180deg at 30% 60%, transparent, rgba(255,79,216,.18), transparent, rgba(139,233,255,.18), transparent), conic-gradient(from 30deg at 70% 45%, transparent, rgba(105,255,148,.12), transparent, rgba(255,230,109,.12), transparent); filter: blur(18px); animation: pulseNebula 9s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate3d(0,0,0); } to { transform: translate3d(-240px,180px,0); } }
    @keyframes pulseNebula { from { transform: scale(1) rotate(0); opacity: .55; } to { transform: scale(1.08) rotate(4deg); opacity: .95; } }
    .meteor { position: absolute; width: 140px; height: 2px; background: linear-gradient(90deg, transparent, white, transparent); filter: drop-shadow(0 0 8px var(--glow)); transform: rotate(-35deg); animation: meteor 4.5s linear infinite; opacity: 0; }
    .meteor:nth-child(1){left:80%;top:10%;animation-delay:.4s}.meteor:nth-child(2){left:50%;top:2%;animation-delay:1.9s;animation-duration:5.8s}.meteor:nth-child(3){left:95%;top:35%;animation-delay:3.2s;animation-duration:6.2s}
    @keyframes meteor { 0%{transform:translate(0,0) rotate(-35deg);opacity:0} 8%{opacity:1} 35%{transform:translate(-850px,520px) rotate(-35deg);opacity:0} 100%{opacity:0} }
    .app { position: relative; z-index: 2; min-height: 100vh; display: grid; place-items: center; padding: 14px; }
    .panel { width: min(820px, 97vw); padding: clamp(16px,3vw,34px); border: 1px solid rgba(255,255,255,.22); border-radius: 34px; background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.06)); backdrop-filter: blur(18px); box-shadow: 0 0 40px rgba(139,233,255,.22), inset 0 0 40px rgba(255,255,255,.05); text-align: center; animation: floatPanel 5s ease-in-out infinite; }
    @keyframes floatPanel { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    h1 { margin: 0 0 4px; font-size: clamp(2rem, 6vw, 4rem); letter-spacing: .04em; text-shadow: 0 0 12px var(--glow), 0 0 28px var(--pink); }
    .subtitle { margin: 0 0 16px; color: rgba(255,255,255,.78); font-size: 1rem; }
    .hud { display:grid; grid-template-columns: repeat(5,1fr); gap:10px; margin-bottom:18px; }
    .stat { padding:10px 8px; border-radius:18px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.14); box-shadow: inset 0 0 18px rgba(139,233,255,.08); }
    .stat b{display:block;font-size:1.25rem;color:var(--gold)} .stat span{font-size:.72rem;opacity:.75;text-transform:uppercase;letter-spacing:.08em}
    .problem-wrap { position:relative; margin: 8px auto 16px; width:min(470px,100%); min-height:165px; display:grid; place-items:center; border-radius:32px; background: radial-gradient(circle, rgba(139,233,255,.18), rgba(255,79,216,.08), rgba(0,0,0,.2)); border:1px solid rgba(255,255,255,.18); overflow:hidden; }
    .orbit{position:absolute;width:240px;height:240px;border:1px dashed rgba(255,255,255,.18);border-radius:50%;animation:spin 8s linear infinite}.planet{position:absolute;top:-9px;left:50%;width:18px;height:18px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green)}@keyframes spin{to{transform:rotate(360deg)}}
    .problem{position:relative;z-index:2;font-size:clamp(4rem,15vw,7.5rem);font-weight:900;line-height:1;text-shadow:0 0 18px var(--glow),0 0 40px rgba(255,79,216,.6);animation:popIn .35s ease}@keyframes popIn{from{transform:scale(.78) rotate(-3deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .answer-display { width:min(270px,90%); min-height:74px; margin:auto; padding:12px 22px; border:2px solid rgba(139,233,255,.65); border-radius:999px; background:rgba(0,0,0,.48); color:white; font-size:2.2rem; font-weight:800; text-align:center; box-shadow:0 0 22px rgba(139,233,255,.25); }
    input { position:absolute; left:-9999px; width:1px; height:1px; opacity:0; caret-color:transparent; }
    .keypad { width:min(360px,96%); margin:14px auto 0; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .key { margin:0; padding:16px 0; border-radius:22px; font-size:1.55rem; touch-action:manipulation; user-select:none; background:linear-gradient(145deg, rgba(255,255,255,.16), rgba(139,233,255,.18)); border:1px solid rgba(255,255,255,.18); box-shadow:0 0 16px rgba(139,233,255,.14); }
    .key.wide { grid-column: span 2; } .key.danger { background:linear-gradient(145deg, rgba(255,79,216,.35), rgba(0,0,0,.22)); }
    .feedback{min-height:34px;margin-top:12px;font-size:1.05rem;font-weight:800;color:var(--green);text-shadow:0 0 12px var(--green)}
    button{border:0;color:white;font-weight:800;cursor:pointer}.reset{margin-top:12px;padding:12px 22px;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--glow));box-shadow:0 0 20px rgba(255,79,216,.42)}button:hover{filter:brightness(1.1)}
    .burst{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:burst .75s ease-out forwards;z-index:10;box-shadow:0 0 16px currentColor}@keyframes burst{to{transform:translate(var(--x),var(--y)) scale(.1);opacity:0}}
    .shake{animation:shake .18s linear}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @media(max-width:700px){.hud{grid-template-columns:repeat(2,1fr)}body{overflow:auto}.panel{animation:none}.stat:last-child{grid-column:span 2}}
  </style>
</head>
<body>
  <div class="space"><div class="nebula"></div><div class="stars"></div><div class="stars2"></div><div class="stars3"></div><div class="meteors"><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div></div></div>
  <main class="app"><section class="panel">
    <h1>Galaxy Add</h1><p class="subtitle">Tap the space keypad. Correct answers auto-launch the next problem.</p>
    <div class="hud"><div class="stat"><b id="score">0</b><span>Score</span></div><div class="stat"><b id="streak">0</b><span>Streak</span></div><div class="stat"><b id="avg">0.00s</b><span>Avg Speed</span></div><div class="stat"><b id="best">--</b><span>Best</span></div><div class="stat"><b id="focus">Mixed</b><span>Focus</span></div></div>
    <div class="problem-wrap" id="card"><div class="orbit"><div class="planet"></div></div><div class="problem" id="problem">0 + 0</div></div>
    <input id="answer" inputmode="none" readonly autocomplete="off" />
    <div class="answer-display" id="answerDisplay">?</div>
    <div class="keypad" id="keypad">
      <button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button>
      <button class="key danger" data-key="back">⌫</button><button class="key" data-key="0">0</button><button class="key danger" data-key="clear">Clear</button>
    </div>
    <div class="feedback" id="feedback">Ready for launch 🚀</div><button class="reset" id="reset">Restart Mission</button>
  </section></main>
<script>
const problemEl=document.getElementById('problem'),answerEl=document.getElementById('answer'),answerDisplay=document.getElementById('answerDisplay'),feedbackEl=document.getElementById('feedback'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),avgEl=document.getElementById('avg'),bestEl=document.getElementById('best'),focusEl=document.getElementById('focus'),cardEl=document.getElementById('card'),resetBtn=document.getElementById('reset'),keypad=document.getElementById('keypad');
let a=0,b=0,answer=0,startedAt=performance.now(),score=0,streak=0,times=[],lastProblem='',typed='',facts=[];
for(let x=0;x<=9;x++){for(let y=0;y<=9;y++){facts.push({a:x,b:y,key:`${x}+${y}`,attempts:0,wrong:0,totalTime:0,lastSeen:0});}}
function factScore(f){const avg=f.attempts?f.totalTime/f.attempts:3.5;const errorBoost=f.wrong*2.5;const slowBoost=Math.max(0,avg-1.8);const newBoost=f.attempts<2?3:0;const staleBoost=(score-f.lastSeen>15)?1.5:0;return 1+errorBoost+slowBoost+newBoost+staleBoost;}
function chooseFact(){let pool=facts.filter(f=>f.key!==lastProblem);let sum=pool.reduce((s,f)=>s+factScore(f),0);let r=Math.random()*sum;for(const f of pool){r-=factScore(f);if(r<=0)return f;}return pool[0];}
function setDisplay(){answerEl.value=typed;answerDisplay.textContent=typed||'?';}
function newProblem(){const f=chooseFact();a=f.a;b=f.b;answer=a+b;lastProblem=f.key;problemEl.textContent=`${a} + ${b}`;problemEl.style.animation='none';problemEl.offsetHeight;problemEl.style.animation='';typed='';setDisplay();startedAt=performance.now();feedbackEl.textContent='Solve it, space cadet ✨';focusEl.textContent=f.attempts<2?'New':(f.wrong?'Weak':'Speed');}
function updateStats(){scoreEl.textContent=score;streakEl.textContent=streak;if(times.length){const avg=times.reduce((s,t)=>s+t,0)/times.length,best=Math.min(...times);avgEl.textContent=`${avg.toFixed(2)}s`;bestEl.textContent=`${best.toFixed(2)}s`;}else{avgEl.textContent='0.00s';bestEl.textContent='--';}}
function celebrate(){const rect=cardEl.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2,colors=['#8be9ff','#ff4fd8','#ffe66d','#69ff94','#fff'];for(let i=0;i<26;i++){const dot=document.createElement('div');dot.className='burst';dot.style.left=`${cx}px`;dot.style.top=`${cy}px`;dot.style.color=colors[i%colors.length];dot.style.background=colors[i%colors.length];const angle=Math.PI*2*i/26,dist=80+Math.random()*120;dot.style.setProperty('--x',`${Math.cos(angle)*dist}px`);dot.style.setProperty('--y',`${Math.sin(angle)*dist}px`);document.body.appendChild(dot);setTimeout(()=>dot.remove(),800);}}
function currentFact(){return facts.find(f=>f.key===`${a}+${b}`);}
function wrongFlash(){streak=0;updateStats();feedbackEl.textContent='Not quite — try again!';cardEl.classList.remove('shake');cardEl.offsetHeight;cardEl.classList.add('shake');const f=currentFact();if(f){f.wrong++;}}
function checkAnswer(){if(typed==='')return;const typedNum=Number(typed);if(typedNum===answer){const elapsed=(performance.now()-startedAt)/1000;const f=currentFact();if(f){f.attempts++;f.totalTime+=elapsed;f.lastSeen=score;}times.push(elapsed);score++;streak++;feedbackEl.textContent=`Correct! ${elapsed.toFixed(2)} seconds 🌟`;updateStats();celebrate();setTimeout(newProblem,360);}else if(typed.length>=String(answer).length){wrongFlash();}}
function pressKey(k){if(k==='clear'){typed='';setDisplay();return;}if(k==='back'){typed=typed.slice(0,-1);setDisplay();return;}if(/^\d$/.test(k)&&typed.length<2){typed+=k;setDisplay();checkAnswer();}}
keypad.addEventListener('pointerdown',e=>{const btn=e.target.closest('[data-key]');if(!btn)return;e.preventDefault();pressKey(btn.dataset.key);});
document.addEventListener('keydown',e=>{if(/^\d$/.test(e.key))pressKey(e.key); if(e.key==='Backspace')pressKey('back'); if(e.key==='Escape')pressKey('clear');});
resetBtn.addEventListener('click',()=>{score=0;streak=0;times=[];typed='';facts.forEach(f=>{f.attempts=0;f.wrong=0;f.totalTime=0;f.lastSeen=0;});updateStats();newProblem();});
answerEl.addEventListener('focus',()=>answerEl.blur());
updateStats();newProblem();
</script>
</body>
</html>
